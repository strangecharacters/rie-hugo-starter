---
label: Post
hide_body: false
fields:
- name: title
  type: text
  config:
    required: false
  label: Title
- name: excerpt
  type: text
  config:
    required: false
  label: Excerpt
- name: date
  type: datetime
  label: Date
  description: ''
  config:
    required: false
    date_format: 
    time_format: 
    display_utc: false
- name: thumbnailImagePosition
  type: text
  config:
    required: false
  label: Thumbnail Image Position
  description: Position of thumbnail on index page (left/right)
  default: left
- name: thumbnailImage
  type: file
  config:
    maxSize: 64
  label: Thumbnail Image
  description: Upload a thumbnail image that shows on index page
- name: category
  type: list
  config:
    use_select: true
    min: 1
    max: 1
    source:
      type: simple
    options:
    - 日本語を考える
    - アイルランドで暮らす
    - まだまだ英語は難しい
  label: Category
  description: Choose a category
